global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'fastapi-apps'
    static_configs:
      - targets: ['ingestion-service:8000', 'analytics-service:8000']

  - job_name: 'processor-worker'
    static_configs:
      - targets: ['processor_service:8000']

  - job_name: 'infrastructure'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'databases'
    static_configs:
      - targets: ['redis-exporter:9121', 'postgres-exporter:9187']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']