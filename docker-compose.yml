services:
  postgres:
    image: postgres:15-alpine
    container_name: greenops_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: greenops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d greenops_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: greenops_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Migrations (runs once, exits 0) ─────────────────────────────────────────
  migrations:
    build:
      context: .
      dockerfile: services/crud/migrations.dockerfile
    container_name: greenops_migrations
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/greenops_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── CRUD / Control Plane ────────────────────────────────────────────────────
  crud:
    build:
      context: .
      dockerfile: services/crud/Dockerfile
    container_name: greenops_crud
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/greenops_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Workers / Data Plane ─────────────────────────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    container_name: greenops_workers
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/greenops_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Analytics / CRON ─────────────────────────────────────────────────────────
  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    container_name: greenops_analytics
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/greenops_db
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: greenops_frontend
    ports:
      - "8080:3000"
    depends_on:
      - crud

  gateway:
    image: nginx:stable-alpine
    container_name: greenops_gateway
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - crud

  # ── Observability ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: greenops_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: greenops_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: greenops_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: greenops_pg_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://user:password@postgres:5432/greenops_db?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: greenops_kafka_exporter
    command: ["--kafka.server=kafka:9092"]
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
