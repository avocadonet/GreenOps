services:
  postgres:
    image: postgres:15-alpine
    container_name: greenops_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: greenops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: greenops_redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: greenops_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  prometheus:
    image: prom/prometheus:latest
    container_name: greenops_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: greenops_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  ingestion-service:
    build: ./services/ingestion
    container_name: ingestion_service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    ports:
      - "8001:8000"
    depends_on:
      - kafka

  processor-service:
    build: ./services/processor
    container_name: processor_service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://user:password@postgres:5432/greenops_db
    depends_on:
      - kafka
      - redis
      - postgres

  gateway:
    image: nginx:stable-alpine
    container_name: greenops_gateway
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - ingestion-service
      - analytics-service
      
  analytics-service:
    build: ./services/analytics
    container_name: analytics_service
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://user:password@postgres:5432/greenops_db
    ports:
      - "8002:8000"
    depends_on:
      - redis
      - postgres

  frontend:
    build: ./frontend
    container_name: greenops_frontend
    ports:
      - "8080:3000"
    depends_on:
      - analytics-service

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: greenops_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: greenops_pg_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://user:password@postgres:5432/greenops_db?sslmode=disable"
    depends_on:
      - postgres

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: greenops_redis_exporter
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: greenops_kafka_exporter
    command: ["--kafka.server=kafka:9092"]
    depends_on:
      - kafka

volumes:
  postgres_data: